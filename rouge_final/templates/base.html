<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HORDE SURVIVOR{% block title %}{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a12;
  --grid: #141425;
  --player: #50c8ff;
  --bullet: #fff050;
  --xp: #3cff78;
  --hp: #dc3232;
  --coin: #ffd700;
  --super: #ff64ff;
  --struct: #50c8c8;
  --event: #ffb43c;
  --white: #ffffff;
  --gray: #969696;
  --dgray: #282837;
  --glow-player: rgba(80,200,255,.25);
  --glow-coin: rgba(255,215,0,.2);
  --glow-xp: rgba(60,255,120,.2);
  --font-display: 'Orbitron', monospace;
  --font-mono: 'Share Tech Mono', monospace;
  --radius: 8px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--white);
  font-family: var(--font-mono);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Scanline overlay ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.04) 2px, rgba(0,0,0,.04) 4px);
  pointer-events: none; z-index: 9999;
}

/* ── Grid background ── */
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 80px 80px;
  pointer-events: none; z-index: -1;
}

/* ── Navigation ── */
nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1rem 2rem;
  border-bottom: 1px solid var(--grid);
  background: rgba(10,10,18,.9);
  backdrop-filter: blur(8px);
  position: sticky; top: 0; z-index: 100;
}
.nav-logo {
  font-family: var(--font-display);
  font-size: 1.1rem; font-weight: 900;
  color: var(--player);
  text-decoration: none;
  letter-spacing: 2px;
  text-shadow: 0 0 20px var(--glow-player);
}
.nav-links { display: flex; gap: 1.5rem; }
.nav-links a {
  color: var(--gray); text-decoration: none;
  font-size: .8rem; letter-spacing: 1px;
  transition: color .2s;
  text-transform: uppercase;
}
.nav-links a:hover { color: var(--white); }
.nav-links a.active { color: var(--player); }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: .5rem;
  padding: .55rem 1.4rem;
  font-family: var(--font-mono);
  font-size: .85rem; letter-spacing: 1px;
  border: 2px solid; border-radius: var(--radius);
  cursor: pointer; text-decoration: none;
  transition: background .15s, box-shadow .15s, transform .1s;
  text-transform: uppercase;
}
.btn:hover { transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn-primary {
  background: transparent;
  border-color: var(--player); color: var(--player);
}
.btn-primary:hover {
  background: rgba(80,200,255,.1);
  box-shadow: 0 0 24px var(--glow-player);
}
.btn-coin {
  background: transparent;
  border-color: var(--coin); color: var(--coin);
}
.btn-coin:hover { background: rgba(255,215,0,.08); }
.btn-danger {
  background: transparent;
  border-color: var(--hp); color: var(--hp);
}
.btn-danger:hover { background: rgba(220,50,50,.1); }
.btn-sm { padding: .35rem .9rem; font-size: .75rem; }

/* ── Cards ── */
.card {
  background: var(--dgray);
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 12px;
  padding: 1.5rem;
}
.card-glow-player { border-color: rgba(80,200,255,.3); }
.card-glow-coin   { border-color: rgba(255,215,0,.3); }
.card-glow-xp     { border-color: rgba(60,255,120,.3); }

/* ── Tables ── */
table { width: 100%; border-collapse: collapse; }
th {
  text-align: left; padding: .6rem 1rem;
  font-size: .7rem; letter-spacing: 2px;
  color: var(--gray); border-bottom: 1px solid var(--grid);
  text-transform: uppercase;
}
td {
  padding: .65rem 1rem;
  font-size: .85rem;
  border-bottom: 1px solid rgba(255,255,255,.04);
}
tr:hover td { background: rgba(255,255,255,.02); }
.rank-1 td { color: var(--coin); }
.rank-2 td { color: #c0c0c0; }
.rank-3 td { color: #cd7f32; }

/* ── Badges ── */
.badge {
  display: inline-block;
  padding: .2rem .6rem;
  border-radius: 4px;
  font-size: .7rem; letter-spacing: 1px;
  text-transform: uppercase;
}
.badge-weapon {
  background: rgba(80,200,255,.12);
  border: 1px solid rgba(80,200,255,.3);
  color: var(--player);
}
.badge-banned {
  background: rgba(220,50,50,.15);
  border: 1px solid rgba(220,50,50,.4);
  color: var(--hp);
}

/* ── Inputs ── */
input, select {
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: var(--radius);
  color: var(--white);
  font-family: var(--font-mono);
  padding: .5rem .9rem;
  font-size: .85rem;
  outline: none;
  transition: border-color .2s;
}
input:focus, select:focus { border-color: var(--player); }
input::placeholder { color: var(--gray); }

/* ── Toasts ── */
#toast-container {
  position: fixed; bottom: 1.5rem; right: 1.5rem;
  display: flex; flex-direction: column; gap: .5rem;
  z-index: 10000;
}
.toast {
  padding: .7rem 1.2rem;
  border-radius: var(--radius);
  font-size: .85rem;
  border-left: 3px solid;
  background: rgba(20,20,36,.95);
  backdrop-filter: blur(6px);
  animation: slideIn .25s ease;
  max-width: 320px;
}
.toast-ok    { border-color: var(--xp); color: var(--xp); }
.toast-error { border-color: var(--hp); color: var(--hp); }
.toast-info  { border-color: var(--player); color: var(--player); }
@keyframes slideIn {
  from { opacity: 0; transform: translateX(20px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* ── Util ── */
.text-coin   { color: var(--coin); }
.text-player { color: var(--player); }
.text-xp     { color: var(--xp); }
.text-hp     { color: var(--hp); }
.text-super  { color: var(--super); }
.text-gray   { color: var(--gray); }
.font-display { font-family: var(--font-display); }
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-1 { gap: .5rem; } .gap-2 { gap: 1rem; } .gap-3 { gap: 1.5rem; }
.mt-1 { margin-top: .5rem; } .mt-2 { margin-top: 1rem; }
.mb-1 { margin-bottom: .5rem; } .mb-2 { margin-bottom: 1rem; }
.w-full { width: 100%; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 1rem; }
@media(max-width:768px) { .grid-2,.grid-4 { grid-template-columns: 1fr; } }

.page-content { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
h1,h2,h3 { font-family: var(--font-display); }
h1 { font-size: 2rem; font-weight: 900; }
h2 { font-size: 1.3rem; font-weight: 700; }
h3 { font-size: 1rem; font-weight: 700; }

/* ── Stat number ── */
.stat-num {
  font-family: var(--font-display);
  font-size: 2.2rem; font-weight: 900;
  line-height: 1;
}
</style>
{% block extra_head %}{% endblock %}
</head>
<body>
<nav>
  <a href="/" class="nav-logo">⚡ HORDE SURVIVOR</a>
  <div class="nav-links">
    <a href="/" id="nav-home">HOME</a>
    <a href="/leaderboard" id="nav-lb">LEADERBOARD</a>
    <a href="/game" id="nav-game" style="color:var(--xp);">⬇ DOWNLOAD</a>
    <a href="/admin" id="nav-admin">ADMIN</a>
  </div>
</nav>

{% block content %}{% endblock %}

<div id="toast-container"></div>

<script>
// ── Toast system ──────────────────────────────────────────────────────────────
function toast(msg, type='info', duration=3500) {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), duration);
}

// ── Active nav ────────────────────────────────────────────────────────────────
document.querySelectorAll('.nav-links a').forEach(a => {
  if (a.href === location.href) a.classList.add('active');
});
</script>
{% block scripts %}{% endblock %}
</body>
</html>
